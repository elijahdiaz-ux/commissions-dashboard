<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sales Dash — Commissions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0A1217;
    --bg-grad-1: rgba(52, 211, 153, 0.10);
    --bg-grad-2: rgba(16, 185, 129, 0.05);
    --sidebar: #0E1A1D;
    --card: #112025;
    --card-2: #16282E;
    --card-3: #1B3138;
    --border: #234049;
    --border-soft: #1A2E33;
    --hairline: rgba(255,255,255,0.06);
    --text: #F1F8F4;
    --text-2: #A5C7B5;
    --text-3: #6B8C7C;
    --text-4: #4A6B5C;
    --accent: #34D399;
    --accent-2: #10B981;
    --accent-3: #6EE7B7;
    --accent-soft: rgba(52, 211, 153, 0.14);
    --yellow: #F3C969;
    --green: #6BD9A4;
    --red: #F08F6A;
    --rose: #E26D8E;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(1200px 800px at 85% 110%, var(--bg-grad-1), transparent 60%),
      radial-gradient(900px 600px at 0% 0%, var(--bg-grad-2), transparent 50%),
      var(--bg);
    overflow-x: hidden;
  }
  .tab { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

  /* SCROLLBARS */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(52, 211, 153,0.15); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(52, 211, 153,0.3); background-clip: content-box; }

  /* APP SHELL */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--sidebar);
    border-right: 1px solid var(--hairline);
    padding: 28px 18px 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 10px;
  }
  .brand-mark {
    width: 32px;
    height: 32px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
  }
  .brand-mark span {
    background: var(--text);
    border-radius: 50%;
  }
  .brand-mark span:nth-child(1) { background: var(--accent-3); }
  .brand-mark span:nth-child(4) { background: var(--accent-3); }
  .brand-name {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.12em;
  }
  .nav { display: flex; flex-direction: column; gap: 4px; }
  .nav-section {
    font-size: 10.5px;
    color: var(--text-4);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 16px 14px 8px;
    font-weight: 600;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 12px;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
    font-weight: 500;
    user-select: none;
    position: relative;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.025); }
  .nav-item.active {
    background: linear-gradient(180deg, rgba(52, 211, 153,0.10), rgba(52, 211, 153,0.04));
    color: var(--text);
    box-shadow: inset 0 0 0 1px rgba(52, 211, 153,0.18), inset 0 0 22px rgba(52, 211, 153,0.08);
  }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.95; }
  .nav-spacer { flex: 1; }
  .profile {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    border-radius: 14px;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--hairline);
  }
  .profile-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #34D399, #10B981);
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 13px;
    color: #fff;
    box-shadow: 0 4px 12px rgba(52, 211, 153,0.4);
  }
  .profile-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .profile-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .profile-email { font-size: 11px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* MAIN */
  .main {
    padding: 28px 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-width: 0;
  }
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: space-between;
  }
  .page-title {
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .pill:hover { background: var(--card-2); color: var(--text); }
  .pill .label { color: var(--text-3); }
  .pill .value { color: var(--text); font-weight: 600; }
  .pill svg { width: 14px; height: 14px; opacity: 0.7; }
  .search {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 10px 14px;
    min-width: 220px;
    max-width: 300px;
  }
  .search input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13px;
    width: 100%;
    font-family: inherit;
  }
  .search input::placeholder { color: var(--text-3); }
  .search > svg { width: 16px; height: 16px; color: var(--text-3); flex-shrink: 0; }
  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--card);
    border: 1px solid var(--border-soft);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--card-2); }
  .icon-btn svg { width: 16px; height: 16px; color: var(--text-2); }

  /* CARDS */
  .card {
    background: linear-gradient(180deg, var(--card) 0%, var(--card) 100%);
    border: 1px solid var(--border-soft);
    border-radius: 22px;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 22px;
    pointer-events: none;
    background: radial-gradient(800px 400px at 90% 0%, rgba(52, 211, 153,0.06), transparent 60%);
  }
  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 28px 8px;
    position: relative;
    z-index: 5;
  }
  .card-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .card-sub {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 4px;
  }
  .card-body { padding: 16px 28px 24px; position: relative; z-index: 1; }

  /* TOP ROW LAYOUT */
  .top-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 380px;
    gap: 22px;
    align-items: stretch;
  }

  /* KPI BARS */
  .bars-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 28px;
    padding: 10px 8px 24px;
  }
  .bar-tile {
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-width: 0;
  }
  .bar-tile-head { display: flex; flex-direction: column; gap: 4px; }
  .bar-tile .value {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1;
  }
  .bar-tile .label {
    font-size: 13px;
    color: var(--text-3);
    font-weight: 500;
  }
  .bar-visual {
    position: relative;
    height: 220px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .bar-capsule {
    position: relative;
    width: 82px;
    border-radius: 14px;
    background:
      linear-gradient(180deg,
        rgba(110, 231, 183, 0.0) 0%,
        rgba(52, 211, 153, 0.18) 30%,
        rgba(16, 185, 129, 0.85) 80%,
        rgba(5, 150, 105, 0.95) 100%);
    box-shadow:
      inset 0 0 28px rgba(52, 211, 153, 0.35),
      inset 0 -20px 30px rgba(5, 150, 105, 0.5),
      0 18px 36px rgba(16, 185, 129, 0.25),
      0 0 60px rgba(52, 211, 153, 0.15);
    border: 1px solid rgba(110, 231, 183, 0.18);
    transition: height 0.6s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  .bar-capsule::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 8px;
    transform: translateX(-50%);
    width: 12px;
    height: 18px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.45);
    filter: blur(2px);
    opacity: 0.7;
  }
  .bar-capsule.inactive {
    background:
      linear-gradient(180deg,
        rgba(120, 120, 140, 0.0) 0%,
        rgba(120, 120, 140, 0.12) 40%,
        rgba(95, 95, 120, 0.6) 100%);
    box-shadow:
      inset 0 0 20px rgba(120, 120, 140, 0.25),
      0 8px 24px rgba(0,0,0,0.3);
  }
  .bar-pct {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: var(--text-2);
    font-weight: 600;
  }
  .bar-divider {
    height: 1px;
    background: var(--hairline);
    margin: 0 8px;
  }
  .submetrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    padding: 18px 8px 4px;
  }
  .submetric {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 8px 12px;
    border-right: 1px solid var(--hairline);
    position: relative;
  }
  .submetric:last-child { border-right: none; }
  .submetric .sm-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .submetric .sm-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-3);
  }
  .submetric .sm-label .dot {
    width: 16px; height: 16px;
    border-radius: 4px;
    display: grid; place-items: center;
  }
  .sm-dot-purple { background: rgba(52, 211, 153,0.18); color: var(--accent-3); }
  .sm-dot-yellow { background: rgba(243, 201, 105, 0.16); color: var(--yellow); }
  .sm-dot-green { background: rgba(107, 217, 164, 0.15); color: var(--green); }
  .submetric .more {
    position: absolute;
    top: 8px;
    right: 10px;
    color: var(--text-4);
    cursor: pointer;
    padding: 2px;
  }
  .submetric .more:hover { color: var(--text-2); }

  /* FORECAST PANEL */
  .forecast {
    display: flex;
    flex-direction: column;
    padding: 24px 26px;
  }
  .forecast-head {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
  }
  .forecast-title {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .forecast-title .accent {
    display: inline-flex;
    align-items: baseline;
    background: rgba(243, 201, 105, 0.15);
    color: var(--yellow);
    padding: 2px 8px;
    border-radius: 8px;
    margin: 0 4px;
    font-size: 22px;
    font-weight: 600;
  }
  .orbit-viz {
    height: 230px;
    position: relative;
    margin: 6px 0 8px;
  }
  .forecast-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 8px;
    border-top: 1px solid var(--hairline);
  }
  .forecast-meta-left { display: flex; flex-direction: column; gap: 4px; }
  .forecast-label {
    font-size: 18px;
    font-weight: 600;
  }
  .forecast-sub {
    font-size: 12px;
    color: var(--text-3);
  }
  .chip-select {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--hairline);
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 12px;
    color: var(--text-2);
    cursor: pointer;
  }
  .chip-select svg { width: 12px; height: 12px; }
  .mini-chart {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--hairline);
    border-radius: 16px;
    padding: 16px;
    margin-top: 14px;
    position: relative;
  }
  .mini-chart-label {
    font-size: 11px;
    color: var(--text-3);
    margin-bottom: 8px;
  }
  .cta-pill {
    display: block;
    margin: 18px auto 0;
    background: var(--text);
    color: #0A0D17;
    padding: 14px 32px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(255,255,255,0.10), 0 0 0 6px rgba(52, 211, 153,0.06);
    transition: all 0.15s;
    white-space: nowrap;
    border: none;
    font-family: inherit;
  }
  .cta-pill:hover { transform: translateY(-1px); box-shadow: 0 14px 36px rgba(255,255,255,0.18); }

  /* LEADERBOARD */
  .leaderboard { padding: 22px 28px 28px; }
  .lb-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 18px;
  }
  .lb-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
  }
  .lb-table th {
    text-align: left;
    font-size: 11.5px;
    color: var(--text-3);
    font-weight: 500;
    padding: 10px 12px;
    border-bottom: 1px solid var(--hairline);
    white-space: nowrap;
  }
  .lb-table td {
    padding: 18px 12px;
    border-bottom: 1px solid var(--hairline);
    font-size: 14px;
    color: var(--text);
    vertical-align: middle;
  }
  .lb-table tr:last-child td { border-bottom: none; }
  .lb-table tr.row { cursor: pointer; transition: background 0.15s; }
  .lb-table tr.row:hover { background: rgba(52, 211, 153,0.04); }
  .lb-table td.rep-col { min-width: 210px; }
  .lb-table td.attain-col { min-width: 160px; }
  .lb-table td.money-col { white-space: nowrap; }
  .rep-cell { display: flex; align-items: center; gap: 14px; min-width: 220px; }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-weight: 700;
    font-size: 13px;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 6px 14px rgba(0,0,0,0.4);
  }
  .rank-col {
    color: var(--text-3);
    font-weight: 600;
    width: 28px;
    text-align: right;
  }
  .role-chip {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    color: var(--text-2);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .attain-cell { display: flex; align-items: center; gap: 12px; min-width: 160px; }
  .attain-bars { display: flex; gap: 3px; }
  .attain-bar { width: 6px; height: 22px; border-radius: 2px; background: rgba(255,255,255,0.06); }
  .attain-bar.on { background: var(--yellow); box-shadow: 0 0 8px rgba(243,201,105,0.4); }
  .attain-bar.on-track { background: var(--accent); box-shadow: 0 0 8px rgba(52, 211, 153,0.4); }
  .attain-bar.over { background: var(--green); box-shadow: 0 0 8px rgba(107,217,164,0.4); }
  .attain-bar.danger { background: var(--rose); box-shadow: 0 0 8px rgba(226,109,142,0.4); }
  .attain-val { font-weight: 600; font-size: 14px; color: var(--text); width: 56px; }
  .row-money { font-weight: 600; }
  .row-money.dim { color: var(--text-3); font-weight: 500; }
  .spark-cell { width: 130px; }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-2);
    white-space: nowrap;
  }
  .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-on { background: var(--green); box-shadow: 0 0 8px rgba(107,217,164,0.6); }
  .dot-behind { background: var(--yellow); box-shadow: 0 0 8px rgba(243,201,105,0.6); }
  .dot-inactive { background: var(--text-4); }
  .row-actions {
    color: var(--text-4);
    padding: 4px;
    text-align: right;
    width: 30px;
  }
  .row-actions svg { width: 18px; height: 18px; }
  .row-actions:hover { color: var(--text-2); }
  .see-all {
    font-size: 12.5px;
    color: var(--text-2);
    text-decoration: underline;
    text-underline-offset: 3px;
    cursor: pointer;
  }
  .see-all:hover { color: var(--text); }

  /* DRAWER */
  .drawer-scrim {
    position: fixed;
    inset: 0;
    background: rgba(10, 13, 23, 0.6);
    backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    z-index: 50;
  }
  .drawer-scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    top: 0; right: 0;
    width: 480px;
    max-width: 92vw;
    height: 100vh;
    background: var(--sidebar);
    border-left: 1px solid var(--border-soft);
    transform: translateX(100%);
    transition: transform 0.32s cubic-bezier(0.2, 0.7, 0.2, 1);
    z-index: 60;
    overflow-y: auto;
    box-shadow: -30px 0 60px rgba(0,0,0,0.4);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    padding: 24px 28px 18px;
    border-bottom: 1px solid var(--hairline);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .drawer-close {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--hairline);
    display: grid; place-items: center;
    cursor: pointer;
    color: var(--text-2);
    flex-shrink: 0;
  }
  .drawer-close:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  .drawer-title { font-size: 18px; font-weight: 600; flex: 1; }
  .drawer-section {
    padding: 20px 28px;
    border-bottom: 1px solid var(--hairline);
  }
  .drawer-section h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--text-3);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .quota-vis {
    background: rgba(52, 211, 153,0.05);
    border: 1px solid rgba(52, 211, 153,0.15);
    border-radius: 14px;
    padding: 18px;
  }
  .quota-track {
    height: 12px;
    background: rgba(255,255,255,0.06);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
    margin-top: 12px;
  }
  .quota-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent-2), var(--accent));
    box-shadow: 0 0 16px rgba(52, 211, 153,0.5);
    position: relative;
  }
  .quota-marker {
    position: absolute;
    top: -4px;
    height: 20px;
    width: 2px;
    background: var(--text);
  }
  .scorecard-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .scorecard-cell {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .scorecard-cell .lbl { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 8px; }
  .scorecard-cell .val { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .scorecard-cell .sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  .trend-block {
    background: rgba(255,255,255,0.025);
