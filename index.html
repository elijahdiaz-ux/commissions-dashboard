<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sales Dash — Commissions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0A1217;
    --bg-grad-1: rgba(52, 211, 153, 0.10);
    --bg-grad-2: rgba(16, 185, 129, 0.05);
    --sidebar: #0E1A1D;
    --card: #112025;
    --card-2: #16282E;
    --card-3: #1B3138;
    --border: #234049;
    --border-soft: #1A2E33;
    --hairline: rgba(255,255,255,0.06);
    --text: #F1F8F4;
    --text-2: #A5C7B5;
    --text-3: #6B8C7C;
    --text-4: #4A6B5C;
    --accent: #34D399;
    --accent-2: #10B981;
    --accent-3: #6EE7B7;
    --accent-soft: rgba(52, 211, 153, 0.14);
    --yellow: #F3C969;
    --green: #6BD9A4;
    --red: #F08F6A;
    --rose: #E26D8E;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(1200px 800px at 85% 110%, var(--bg-grad-1), transparent 60%),
      radial-gradient(900px 600px at 0% 0%, var(--bg-grad-2), transparent 50%),
      var(--bg);
    overflow-x: hidden;
  }
  .tab { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

  /* SCROLLBARS */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(52, 211, 153,0.15); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(52, 211, 153,0.3); background-clip: content-box; }

  /* APP SHELL */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--sidebar);
    border-right: 1px solid var(--hairline);
    padding: 28px 18px 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 10px;
  }
  .brand-mark {
    width: 32px;
    height: 32px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
  }
  .brand-mark span {
    background: var(--text);
    border-radius: 50%;
  }
  .brand-mark span:nth-child(1) { background: var(--accent-3); }
  .brand-mark span:nth-child(4) { background: var(--accent-3); }
  .brand-name {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.12em;
  }
  .nav { display: flex; flex-direction: column; gap: 4px; }
  .nav-section {
    font-size: 10.5px;
    color: var(--text-4);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 16px 14px 8px;
    font-weight: 600;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 12px;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
    font-weight: 500;
    user-select: none;
    position: relative;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.025); }
  .nav-item.active {
    background: linear-gradient(180deg, rgba(52, 211, 153,0.10), rgba(52, 211, 153,0.04));
    color: var(--text);
    box-shadow: inset 0 0 0 1px rgba(52, 211, 153,0.18), inset 0 0 22px rgba(52, 211, 153,0.08);
  }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.95; }
  .nav-spacer { flex: 1; }
  .profile {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    border-radius: 14px;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--hairline);
  }
  .profile-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #34D399, #10B981);
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 13px;
    color: #fff;
    box-shadow: 0 4px 12px rgba(52, 211, 153,0.4);
  }
  .profile-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .profile-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .profile-email { font-size: 11px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* MAIN */
  .main {
    padding: 28px 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-width: 0;
  }
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: space-between;
  }
  .page-title {
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .pill:hover { background: var(--card-2); color: var(--text); }
  .pill .label { color: var(--text-3); }
  .pill .value { color: var(--text); font-weight: 600; }
  .pill svg { width: 14px; height: 14px; opacity: 0.7; }
  .search {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 10px 14px;
    min-width: 220px;
    max-width: 300px;
  }
  .search input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13px;
    width: 100%;
    font-family: inherit;
  }
  .search input::placeholder { color: var(--text-3); }
  .search > svg { width: 16px; height: 16px; color: var(--text-3); flex-shrink: 0; }
  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--card);
    border: 1px solid var(--border-soft);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--card-2); }
  .icon-btn svg { width: 16px; height: 16px; color: var(--text-2); }

  /* CARDS */
  .card {
    background: linear-gradient(180deg, var(--card) 0%, var(--card) 100%);
    border: 1px solid var(--border-soft);
    border-radius: 22px;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 22px;
    pointer-events: none;
    background: radial-gradient(800px 400px at 90% 0%, rgba(52, 211, 153,0.06), transparent 60%);
  }
  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 28px 8px;
    position: relative;
    z-index: 5;
  }
  .card-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .card-sub {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 4px;
  }
  .card-body { padding: 16px 28px 24px; position: relative; z-index: 1; }

  /* TOP ROW LAYOUT */
  .top-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 380px;
    gap: 22px;
    align-items: stretch;
  }

  /* KPI BARS */
  .bars-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 28px;
    padding: 10px 8px 24px;
  }
  .bar-tile {
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-width: 0;
  }
  .bar-tile-head { display: flex; flex-direction: column; gap: 4px; }
  .bar-tile .value {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1;
  }
  .bar-tile .label {
    font-size: 13px;
    color: var(--text-3);
    font-weight: 500;
  }
  .bar-visual {
    position: relative;
    height: 220px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .bar-capsule {
    position: relative;
    width: 82px;
    border-radius: 14px;
    background:
      linear-gradient(180deg,
        rgba(110, 231, 183, 0.0) 0%,
        rgba(52, 211, 153, 0.18) 30%,
        rgba(16, 185, 129, 0.85) 80%,
        rgba(5, 150, 105, 0.95) 100%);
    box-shadow:
      inset 0 0 28px rgba(52, 211, 153, 0.35),
      inset 0 -20px 30px rgba(5, 150, 105, 0.5),
      0 18px 36px rgba(16, 185, 129, 0.25),
      0 0 60px rgba(52, 211, 153, 0.15);
    border: 1px solid rgba(110, 231, 183, 0.18);
    transition: height 0.6s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  .bar-capsule::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 8px;
    transform: translateX(-50%);
    width: 12px;
    height: 18px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.45);
    filter: blur(2px);
    opacity: 0.7;
  }
  .bar-capsule.inactive {
    background:
      linear-gradient(180deg,
        rgba(120, 120, 140, 0.0) 0%,
        rgba(120, 120, 140, 0.12) 40%,
        rgba(95, 95, 120, 0.6) 100%);
    box-shadow:
      inset 0 0 20px rgba(120, 120, 140, 0.25),
      0 8px 24px rgba(0,0,0,0.3);
  }
  .bar-pct {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: var(--text-2);
    font-weight: 600;
  }
  .bar-divider {
    height: 1px;
    background: var(--hairline);
    margin: 0 8px;
  }
  .submetrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    padding: 18px 8px 4px;
  }
  .submetric {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 8px 12px;
    border-right: 1px solid var(--hairline);
    position: relative;
  }
  .submetric:last-child { border-right: none; }
  .submetric .sm-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .submetric .sm-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-3);
  }
  .submetric .sm-label .dot {
    width: 16px; height: 16px;
    border-radius: 4px;
    display: grid; place-items: center;
  }
  .sm-dot-purple { background: rgba(52, 211, 153,0.18); color: var(--accent-3); }
  .sm-dot-yellow { background: rgba(243, 201, 105, 0.16); color: var(--yellow); }
  .sm-dot-green { background: rgba(107, 217, 164, 0.15); color: var(--green); }
  .submetric .more {
    position: absolute;
    top: 8px;
    right: 10px;
    color: var(--text-4);
    cursor: pointer;
    padding: 2px;
  }
  .submetric .more:hover { color: var(--text-2); }

  /* FORECAST PANEL */
  .forecast {
    display: flex;
    flex-direction: column;
    padding: 24px 26px;
  }
  .forecast-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }
  .forecast-title {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .forecast-title .accent {
    display: inline-flex;
    align-items: baseline;
    background: rgba(243, 201, 105, 0.15);
    color: var(--yellow);
    padding: 2px 8px;
    border-radius: 8px;
    margin: 0 4px;
    font-size: 22px;
    font-weight: 600;
  }
  .orbit-viz {
    height: 230px;
    position: relative;
    margin: 6px 0 8px;
  }
  .forecast-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 8px;
    border-top: 1px solid var(--hairline);
  }
  .forecast-meta-left { display: flex; flex-direction: column; gap: 4px; }
  .forecast-label {
    font-size: 18px;
    font-weight: 600;
  }
  .forecast-sub {
    font-size: 12px;
    color: var(--text-3);
  }
  .chip-select {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--hairline);
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 12px;
    color: var(--text-2);
    cursor: pointer;
  }
  .chip-select svg { width: 12px; height: 12px; }
  .mini-chart {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--hairline);
    border-radius: 16px;
    padding: 16px;
    margin-top: 14px;
    position: relative;
  }
  .mini-chart-label {
    font-size: 11px;
    color: var(--text-3);
    margin-bottom: 8px;
  }
  .cta-pill {
    display: block;
    margin: 18px auto 0;
    background: var(--text);
    color: #0A0D17;
    padding: 14px 32px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(255,255,255,0.10), 0 0 0 6px rgba(52, 211, 153,0.06);
    transition: all 0.15s;
    white-space: nowrap;
    border: none;
    font-family: inherit;
  }
  .cta-pill:hover { transform: translateY(-1px); box-shadow: 0 14px 36px rgba(255,255,255,0.18); }

  /* LEADERBOARD */
  .leaderboard { padding: 22px 28px 28px; }
  .lb-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 18px;
  }
  .lb-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
  }
  .lb-table th {
    text-align: left;
    font-size: 11.5px;
    color: var(--text-3);
    font-weight: 500;
    padding: 10px 12px;
    border-bottom: 1px solid var(--hairline);
    white-space: nowrap;
  }
  .lb-table td {
    padding: 18px 12px;
    border-bottom: 1px solid var(--hairline);
    font-size: 14px;
    color: var(--text);
    vertical-align: middle;
  }
  .lb-table tr:last-child td { border-bottom: none; }
  .lb-table tr.row { cursor: pointer; transition: background 0.15s; }
  .lb-table tr.row:hover { background: rgba(52, 211, 153,0.04); }
  .lb-table td.rep-col { min-width: 210px; }
  .lb-table td.attain-col { min-width: 160px; }
  .lb-table td.money-col { white-space: nowrap; }
  .rep-cell { display: flex; align-items: center; gap: 14px; min-width: 220px; }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-weight: 700;
    font-size: 13px;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 6px 14px rgba(0,0,0,0.4);
  }
  .rank-col {
    color: var(--text-3);
    font-weight: 600;
    width: 28px;
    text-align: right;
  }
  .role-chip {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    color: var(--text-2);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .attain-cell { display: flex; align-items: center; gap: 12px; min-width: 160px; }
  .attain-bars { display: flex; gap: 3px; }
  .attain-bar { width: 6px; height: 22px; border-radius: 2px; background: rgba(255,255,255,0.06); }
  .attain-bar.on { background: var(--yellow); box-shadow: 0 0 8px rgba(243,201,105,0.4); }
  .attain-bar.on-track { background: var(--accent); box-shadow: 0 0 8px rgba(52, 211, 153,0.4); }
  .attain-bar.over { background: var(--green); box-shadow: 0 0 8px rgba(107,217,164,0.4); }
  .attain-bar.danger { background: var(--rose); box-shadow: 0 0 8px rgba(226,109,142,0.4); }
  .attain-val { font-weight: 600; font-size: 14px; color: var(--text); width: 56px; }
  .row-money { font-weight: 600; }
  .row-money.dim { color: var(--text-3); font-weight: 500; }
  .spark-cell { width: 130px; }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-2);
    white-space: nowrap;
  }
  .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-on { background: var(--green); box-shadow: 0 0 8px rgba(107,217,164,0.6); }
  .dot-behind { background: var(--yellow); box-shadow: 0 0 8px rgba(243,201,105,0.6); }
  .dot-inactive { background: var(--text-4); }
  .row-actions {
    color: var(--text-4);
    padding: 4px;
    text-align: right;
    width: 30px;
  }
  .row-actions svg { width: 18px; height: 18px; }
  .row-actions:hover { color: var(--text-2); }
  .see-all {
    font-size: 12.5px;
    color: var(--text-2);
    text-decoration: underline;
    text-underline-offset: 3px;
    cursor: pointer;
  }
  .see-all:hover { color: var(--text); }

  /* DRAWER */
  .drawer-scrim {
    position: fixed;
    inset: 0;
    background: rgba(10, 13, 23, 0.6);
    backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    z-index: 50;
  }
  .drawer-scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    top: 0; right: 0;
    width: 650px;
    max-width: 92vw;
    height: 100vh;
    background: var(--sidebar);
    border-left: 1px solid var(--border-soft);
    transform: translateX(100%);
    transition: transform 0.32s cubic-bezier(0.2, 0.7, 0.2, 1);
    z-index: 60;
    overflow-y: auto;
    box-shadow: -30px 0 60px rgba(0,0,0,0.4);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    padding: 24px 28px 18px;
    border-bottom: 1px solid var(--hairline);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .drawer-close {
    width: 32px; height: 32px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--hairline);
    display: grid; place-items: center;
    cursor: pointer;
    color: var(--text-2);
    flex-shrink: 0;
  }
  .drawer-close:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  .drawer-title { font-size: 18px; font-weight: 600; flex: 1; }
  .drawer-section {
    padding: 20px 28px;
    border-bottom: 1px solid var(--hairline);
  }
  .drawer-section h4 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--text-3);
    font-weight: 600;
    margin-bottom: 14px;
  }
  .quota-vis {
    background: rgba(52, 211, 153,0.05);
    border: 1px solid rgba(52, 211, 153,0.15);
    border-radius: 14px;
    padding: 18px;
  }
  .quota-track {
    height: 12px;
    background: rgba(255,255,255,0.06);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
    margin-top: 12px;
  }
  .quota-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent-2), var(--accent));
    box-shadow: 0 0 16px rgba(52, 211, 153,0.5);
    position: relative;
  }
  .quota-marker {
    position: absolute;
    top: -4px;
    height: 20px;
    width: 2px;
    background: var(--text);
  }
  .scorecard-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .scorecard-cell {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .scorecard-cell .lbl { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 8px; }
  .scorecard-cell .val { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .scorecard-cell .sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  .trend-block {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 18px;
  }
  .pay-strip {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 14px 0;
    border-bottom: 1px dashed var(--hairline);
  }
  .pay-strip:last-child { border-bottom: none; }
  .pay-strip .key { font-size: 13px; color: var(--text-2); }
  .pay-strip .val { font-size: 14px; font-weight: 600; }
  .pay-strip.total .key { color: var(--text); font-weight: 600; }
  .pay-strip.total .val { font-size: 18px; color: var(--accent-3); }

  /* KEY METRICS GRID */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }
  .metric-tile {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    transition: all 0.15s;
  }
  .metric-tile:hover {
    background: rgba(255,255,255,0.04);
    border-color: var(--border-soft);
  }
  .metric-tile.highlight {
    background: rgba(52, 211, 153, 0.08);
    border-color: rgba(52, 211, 153, 0.25);
  }
  .metric-tile.highlight .metric-icon {
    background: rgba(52, 211, 153, 0.2);
    color: var(--accent-3);
  }
  .metric-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    display: grid;
    place-items: center;
    color: var(--text-2);
    flex-shrink: 0;
  }
  .metric-icon svg { width: 20px; height: 20px; }
  .metric-content { min-width: 0; }
  .metric-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .metric-label {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 4px;
  }
  .metrics-secondary {
    display: flex;
    gap: 32px;
    padding-top: 16px;
    border-top: 1px solid var(--hairline);
  }
  .metric-secondary-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .metric-secondary-value {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .metric-secondary-label {
    font-size: 12px;
    color: var(--text-3);
  }

  /* YTD CHART */
  .ytd-legend {
    display: flex;
    gap: 20px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-3);
  }
  .legend-bar {
    width: 16px;
    height: 10px;
    border-radius: 3px;
    background: linear-gradient(180deg, #6EE7B7, #10B981);
  }
  .legend-line {
    width: 16px;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, #F3C969, #FBBF24);
  }
  .ytd-summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--hairline);
  }
  .ytd-stat {
    text-align: center;
  }
  .ytd-stat-label {
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .ytd-stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  /* PACING CARD */
  .pacing-card {
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 18px;
  }
  .pacing-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 16px;
  }
  .pacing-metric { text-align: center; }
  .pacing-label {
    font-size: 10px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .pacing-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
  }
  .pacing-bar-container { margin-bottom: 14px; }
  .pacing-bar-track {
    height: 12px;
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
  }
  .pacing-bar-expected {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    background: rgba(255,255,255,0.1);
    border-right: 2px dashed var(--text-3);
  }
  .pacing-bar-actual {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    border-radius: 6px;
    box-shadow: 0 0 10px rgba(107, 217, 164, 0.4);
  }
  .pacing-bar-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-4);
  }
  .pacing-status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid;
    font-size: 12px;
  }
  .dot-risk { background: var(--yellow); box-shadow: 0 0 8px rgba(243,201,105,0.6); }

  /* DEALS TABLE */
  .deals-list { max-height: 300px; overflow-y: auto; }
  .deals-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .deals-table th {
    text-align: left;
    font-size: 10px;
    color: var(--text-3);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 8px 6px;
    border-bottom: 1px solid var(--hairline);
    position: sticky;
    top: 0;
    background: var(--sidebar);
  }
  .deals-table td {
    padding: 10px 6px;
    border-bottom: 1px solid var(--hairline);
    color: var(--text-2);
    vertical-align: middle;
  }
  .deals-table tr:last-child td { border-bottom: none; }
  .deals-table tr:hover td { background: rgba(52, 211, 153, 0.04); }
  .product-chip {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    color: var(--text-3);
    font-size: 10px;
    font-weight: 500;
  }

  /* POPOVER */
  .popover-wrap { position: relative; }
  .popover {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 180px;
    background: #1E2238;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(52, 211, 153,0.06);
    z-index: 40;
    animation: pop 0.14s ease-out;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .popover-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-2);
    cursor: pointer;
    user-select: none;
  }
  .popover-item:hover { background: rgba(52, 211, 153,0.10); color: var(--text); }
  .popover-item.active { background: rgba(52, 211, 153,0.16); color: var(--text); }
  .popover-item .check { color: var(--accent-3); opacity: 0; }
  .popover-item.active .check { opacity: 1; }

  /* INFO BUTTON */
  .info-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--hairline);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-3);
  }
  .info-btn:hover {
    background: rgba(52, 211, 153, 0.15);
    border-color: var(--accent);
    color: var(--accent-3);
  }
  .info-btn svg { width: 16px; height: 16px; }

  /* METHODOLOGY MODAL */
  .modal-scrim {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 100;
  }
  .modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    z-index: 101;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--hairline);
  }
  .modal-header h3 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    cursor: pointer;
    color: var(--text-3);
    transition: all 0.15s;
  }
  .modal-close:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
  }
  .modal-close svg { width: 18px; height: 18px; }
  .modal-body {
    padding: 24px;
  }
  .method-section {
    margin-bottom: 24px;
  }
  .method-section:last-child { margin-bottom: 0; }
  .method-section h4 {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  .method-section p {
    font-size: 14px;
    color: var(--text-2);
    line-height: 1.6;
  }
  .method-section ul {
    margin: 12px 0 0 0;
    padding-left: 20px;
  }
  .method-section li {
    font-size: 13px;
    color: var(--text-2);
    margin-bottom: 6px;
  }
  .formula-box {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 14px 18px;
    margin: 12px 0;
  }
  .formula-box code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent-3);
  }
  .method-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .method-stat {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .method-stat.highlight {
    background: rgba(52, 211, 153, 0.08);
    border-color: rgba(52, 211, 153, 0.2);
  }
  .method-stat.accent {
    background: rgba(52, 211, 153, 0.15);
    border-color: rgba(52, 211, 153, 0.4);
  }
  .method-label {
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .method-value {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .method-stat.accent .method-value {
    color: var(--accent-3);
  }

  /* TOAST */
  .toast-wrap {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 80;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    pointer-events: none;
  }
  .toast {
    background: var(--card-2);
    border: 1px solid rgba(52, 211, 153,0.30);
    border-radius: 14px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(52, 211, 153,0.04), 0 0 30px rgba(52, 211, 153,0.18);
    color: var(--text);
    font-size: 13.5px;
    pointer-events: auto;
    animation: toast-in 0.25s cubic-bezier(0.2,0.8,0.2,1);
    min-width: 320px;
  }
  @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .toast .check-circle {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #34D399, #10B981);
    display: grid; place-items: center;
    color: #fff;
    flex-shrink: 0;
  }
  .toast .toast-title { font-weight: 600; }
  .toast .toast-sub { color: var(--text-3); font-size: 12px; margin-top: 2px; }
  .toast-close { color: var(--text-3); cursor: pointer; padding: 4px; margin-left: 6px; }
  .toast-close:hover { color: var(--text); }

  /* SORTABLE COL */
  .lb-table th.sortable { cursor: pointer; user-select: none; transition: color 0.15s; }
  .lb-table th.sortable:hover { color: var(--text-2); }
  .lb-table th .sort-ind { margin-left: 4px; color: var(--accent-3); font-size: 9px; vertical-align: middle; }

  /* REPS VIEW */
  .reps-layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
    flex: 1;
    min-height: 0;
  }
  .reps-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    max-height: calc(100vh - 160px);
    padding-right: 8px;
  }
  .rep-card {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 16px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .rep-card:hover {
    background: var(--card-2);
    border-color: var(--border);
  }
  .rep-card.selected {
    background: rgba(52, 211, 153, 0.08);
    border-color: rgba(52, 211, 153, 0.3);
  }
  .rep-card.inactive {
    opacity: 0.6;
  }
  .rep-card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .rep-card-info { flex: 1; min-width: 0; }
  .rep-card-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .rep-card-role {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .plan-chip {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    color: var(--text-3);
    font-weight: 500;
  }
  .rep-card-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .rep-card-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .rep-card-stat .stat-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .rep-card-stat .stat-label {
    font-size: 10px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  /* Rep Detail Panel */
  .rep-detail {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    overflow-y: auto;
    max-height: calc(100vh - 160px);
  }
  .rep-detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 400px;
    color: var(--text-3);
    gap: 12px;
  }
  .rep-detail-empty svg {
    width: 48px;
    height: 48px;
    opacity: 0.4;
  }
  .rep-detail-content {
    padding: 28px;
  }
  .rep-detail-header {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--hairline);
  }
  .rep-detail-header h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
  }
  .detail-section {
    margin-bottom: 28px;
  }
  .detail-section h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
  }

  /* Plan Details Card */
  .plan-details-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 18px;
  }
  .plan-info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--hairline);
  }
  .plan-info-row:last-of-type { border-bottom: none; }
  .plan-info-label {
    font-size: 13px;
    color: var(--text-3);
  }
  .plan-info-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .plan-tiers {
    padding: 14px 0;
    border-top: 1px solid var(--hairline);
    margin-top: 10px;
  }
  .tier-list {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tier-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
  }
  .tier-label {
    font-size: 12px;
    color: var(--text-2);
  }
  .tier-rate {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-3);
  }
  .plan-description {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--hairline);
    line-height: 1.5;
  }

  /* YTD Grid */
  .ytd-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .ytd-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .ytd-card.accent {
    background: rgba(52, 211, 153, 0.08);
    border-color: rgba(52, 211, 153, 0.2);
  }
  .ytd-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .ytd-card.accent .ytd-value {
    color: var(--accent-3);
  }
  .ytd-label {
    font-size: 10px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  /* Monthly Breakdown */
  .monthly-breakdown {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    overflow: hidden;
  }
  .monthly-header {
    display: grid;
    grid-template-columns: 80px 1fr 80px;
    gap: 16px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.02);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .monthly-row {
    display: grid;
    grid-template-columns: 80px 1fr 80px;
    gap: 16px;
    padding: 12px 16px;
    border-top: 1px solid var(--hairline);
    align-items: center;
  }
  .month-label {
    font-size: 13px;
    color: var(--text-2);
    font-weight: 500;
  }
  .month-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .month-deals {
    font-size: 14px;
    color: var(--text-2);
    text-align: right;
  }

  /* Compare Feature */
  .compare-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    color: var(--text-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .compare-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .compare-btn.active { background: rgba(99, 102, 241, 0.15); border-color: rgba(99, 102, 241, 0.4); color: #818cf8; }
  .compare-btn svg { width: 16px; height: 16px; }
  .rep-card.compare-mode { cursor: pointer; }
  .rep-card.compare-mode:hover { border-color: #818cf8; }
  .rep-card.comparing { border-color: #818cf8; background: rgba(99, 102, 241, 0.08); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
  .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    color: var(--text-2);
    cursor: pointer;
  }
  .back-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .back-btn svg { width: 20px; height: 20px; }
  .compare-layout {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0;
    padding: 24px;
    height: calc(100vh - 120px);
    overflow-y: auto;
  }
  .compare-panel {
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 18px;
    padding: 28px;
    overflow-y: auto;
